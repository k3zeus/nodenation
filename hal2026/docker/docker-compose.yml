version: '3.8'

networks:
  internal:
    driver: bridge

services:
  # ========== HEIMDALL ==========
  heimdall:
    image: lscr.io/linuxserver/heimdall:latest
    container_name: heimdall
    environment:
      - PUID=1001
      - PGID=1001
      - TZ=America/New_York
    volumes:
      - ${HEIMDALL_CONFIG_DIR}:/config
    ports:
      - "${HEIMDALL_PORT}:80"
      - "${HEIMDALL_SSL_PORT}:443"
    restart: unless-stopped
    networks:
      - internal

  # ========== SYNCTHING ==========
  syncthing:
    image: lscr.io/linuxserver/syncthing:latest
    container_name: syncthing
    environment:
      - PUID=1001
      - PGID=1001
      - TZ=America/New_York
      - STGUIUSER=${SYNCTHING_USER}
      - STGUIPASS=${SYNCTHING_PASS}
    volumes:
      - ${SYNCTHING_CONFIG_DIR}:/config
      - ${SYNCTHING_DATA_DIR}:/data
    ports:
      - "${SYNCTHING_PORT}:8384"
      - "22000:22000"
      - "21027:21027/udp"
    restart: unless-stopped
    networks:
      - internal

  # ========== CLOUDFLARED ==========
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    command: tunnel run --token ${CLOUDFLARED_TOKEN}
    restart: unless-stopped
    networks:
      - internal

  # ========== WIREGUARD (wg-easy) ==========
  wireguard:
    image: weejewel/wg-easy:latest
    container_name: wireguard
    environment:
      - WG_HOST=${WG_HOST}
      - PASSWORD=${WG_PASSWORD}
      - WG_PORT=${WG_PORT}
      - WG_DEFAULT_ADDRESS=${WG_ADDRESS}
    volumes:
      - ${WG_CONFIG_DIR}:/etc/wireguard
    ports:
      - "${WG_PORT}:${WG_PORT}/udp"
      - "${WG_UI_PORT}:51821/tcp"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    restart: unless-stopped
    networks:
      - internal

  # ========== NEXTCLOUD + PostgreSQL ==========
  postgres:
    image: postgres:15-alpine
    container_name: nextcloud_db
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ${POSTGRES_DATA_DIR}:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - internal

  nextcloud:
    image: lscr.io/linuxserver/nextcloud:latest
    container_name: nextcloud
    environment:
      - PUID=1001
      - PGID=1001
      - TZ=America/New_York
      - MYSQL_HOST=postgres
      - MYSQL_DATABASE=${POSTGRES_DB}
      - MYSQL_USER=${POSTGRES_USER}
      - MYSQL_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ${NEXTCLOUD_CONFIG_DIR}:/config
    ports:
      - "${NEXTCLOUD_PORT}:443"
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - internal

  # ========== NGINX ==========
  nginx:
    image: nginx:alpine
    container_name: nginx
    volumes:
      - ${NGINX_CONF_DIR}:/etc/nginx/conf.d
      - ${NGINX_HTML_DIR}:/usr/share/nginx/html
      - ${NGINX_AUTH_DIR}:/etc/nginx/auth
    ports:
      - "${NGINX_PORT}:80"
      - "${NGINX_SSL_PORT}:443"
    restart: unless-stopped
    networks:
      - internal

  # ========== UPTIME KUMA ==========
  uptimekuma:
    image: louislam/uptime-kuma:latest
    container_name: uptimekuma
    volumes:
      - ${UPTIME_KUMA_DATA_DIR}:/app/data
    ports:
      - "${UPTIME_KUMA_PORT}:3001"
    restart: unless-stopped
    networks:
      - internal

  # ========== KEEPASSXC (Keeweb) ==========
  keeweb:
    image: keeweb/keeweb:latest
    container_name: keeweb
    environment:
      - KEEWEB_TITLE=Meu Gerenciador
    volumes:
      - ${KEEWEB_DATA_DIR}:/data
    ports:
      - "${KEEWEB_PORT}:80"
    restart: unless-stopped
    networks:
      - internal